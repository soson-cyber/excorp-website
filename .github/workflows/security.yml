name: Security CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:notion-boundary
      - run: node --experimental-strip-types --test scripts/contact-security.test.mjs
      - run: npm run test:cf-purge
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build
