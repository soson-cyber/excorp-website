name: Security CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Security verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:notion-boundary
      - run: npm run test:regression
      - run: npm run lint
      - run: npx --no-install tsc --noEmit
      - run: npm run build
