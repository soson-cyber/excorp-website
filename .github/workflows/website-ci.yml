name: Website CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: website-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Website verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run regression contracts
        run: npm run test:regression

      - name: Type-check
        run: npx --no-install tsc --noEmit

      - name: Build
        run: npm run build
