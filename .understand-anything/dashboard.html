<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>excorp-website — Knowledge Graph</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
  :root{ --bg:#0E0626; --panel:#160a3a; --line:#2a1d5e; --ink:#eceaf6; --muted:#a79fce; --mint:#45F1E0; --purple:#7d5cff; --pink:#D206EE; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--ink);
    font-family:-apple-system,"Noto Sans KR",Segoe UI,Roboto,sans-serif; overflow:hidden; }
  #app{ display:grid; grid-template-columns:1fr 340px; grid-template-rows:auto 1fr; height:100vh; }
  header{ grid-column:1/3; display:flex; align-items:center; gap:16px; padding:12px 20px; border-bottom:1px solid var(--line); background:rgba(0,0,0,.25); }
  header h1{ font-size:15px; margin:0; font-weight:600; letter-spacing:.2px; }
  header .stat{ font-family:ui-monospace,monospace; font-size:11px; color:var(--muted); }
  header .stat b{ color:var(--mint); font-weight:600; }
  #search{ margin-left:auto; background:var(--panel); border:1px solid var(--line); color:var(--ink);
    border-radius:999px; padding:7px 14px; font-size:13px; width:240px; outline:none; }
  #search:focus{ border-color:var(--purple); }
  #graph{ position:relative; overflow:hidden; }
  svg{ width:100%; height:100%; display:block; cursor:grab; }
  svg:active{ cursor:grabbing; }
  line.link{ stroke:#5a4aa3; stroke-opacity:.35; }
  line.link.hl{ stroke:var(--mint); stroke-opacity:.9; }
  circle.node{ stroke:#0E0626; stroke-width:1.5; cursor:pointer; }
  circle.node.dim{ opacity:.12; }
  text.lab{ fill:var(--muted); font-size:9px; pointer-events:none; font-family:ui-monospace,monospace; }
  text.lab.dim{ opacity:.08; }
  /* side panel */
  aside{ grid-row:2; border-left:1px solid var(--line); background:var(--panel); padding:18px; overflow:auto; }
  aside h2{ font-size:11px; text-transform:uppercase; letter-spacing:.18em; color:var(--muted); margin:0 0 10px; font-family:ui-monospace,monospace; }
  .legend{ display:flex; flex-direction:column; gap:7px; margin-bottom:22px; }
  .legend .row{ display:flex; align-items:center; gap:9px; font-size:12px; cursor:pointer; color:var(--ink); }
  .legend .row.off{ opacity:.35; }
  .legend .dot{ width:11px; height:11px; border-radius:3px; flex:none; }
  .legend .ct{ margin-left:auto; font-family:ui-monospace,monospace; font-size:10px; color:var(--muted); }
  #detail .nm{ font-size:16px; font-weight:600; margin:0 0 4px; word-break:break-word; }
  #detail .ty{ display:inline-block; font-family:ui-monospace,monospace; font-size:10px; text-transform:uppercase; letter-spacing:.1em;
    background:rgba(125,92,255,.18); color:#c9bdff; border-radius:999px; padding:2px 9px; margin-bottom:10px; }
  #detail .fp{ font-family:ui-monospace,monospace; font-size:11px; color:var(--mint); word-break:break-all; margin-bottom:10px; }
  #detail .sm{ font-size:13px; line-height:1.7; color:#d8d4ee; margin-bottom:12px; }
  #detail .tags{ display:flex; flex-wrap:wrap; gap:5px; margin-bottom:14px; }
  #detail .tag{ font-size:10px; background:var(--bg); border:1px solid var(--line); border-radius:999px; padding:2px 8px; color:var(--muted); }
  #detail .rel h3{ font-size:10px; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); margin:14px 0 6px; }
  #detail .rel a{ display:block; font-size:12px; color:#cfc7f0; text-decoration:none; padding:3px 0; cursor:pointer; border-bottom:1px solid rgba(255,255,255,.04); }
  #detail .rel a:hover{ color:var(--mint); }
  #detail .rel .ek{ font-family:ui-monospace,monospace; font-size:9px; color:var(--purple); }
  .hint{ font-size:11px; color:var(--muted); line-height:1.6; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>excorp-website <span style="color:var(--muted);font-weight:400">· Knowledge Graph</span></h1>
    <span class="stat" id="stats"></span>
    <input id="search" placeholder="검색 (파일·요약·태그)…" />
  </header>
  <div id="graph"><svg></svg></div>
  <aside>
    <h2>레이어</h2>
    <div class="legend" id="legend"></div>
    <h2>선택 노드</h2>
    <div id="detail"><p class="hint">노드를 클릭하면 요약·관계가 표시됩니다.<br/>드래그=이동, 휠=줌, 범례 클릭=레이어 토글.</p></div>
  </aside>
</div>
<script>
const PALETTE = ["#7d5cff","#45F1E0","#D206EE","#f6b73c","#4ade80","#38bdf8","#fb7185","#a78bfa","#94a3b8"];
const FILE_TYPES = new Set(["file","config","document","service","pipeline","table","schema","resource","endpoint"]);

d3.json("knowledge-graph.json").then(g => {
  const byId = new Map(g.nodes.map(n=>[n.id,n]));
  // layer assignment
  const layerOf = new Map(); const layerMeta = [];
  g.layers.forEach((l,i)=>{ layerMeta.push({...l, color:PALETTE[i%PALETTE.length], idx:i}); l.nodeIds.forEach(id=>layerOf.set(id,i)); });
  // file-level subgraph (architecture view)
  const nodes = g.nodes.filter(n=>FILE_TYPES.has(n.type)).map(n=>({...n, layer: layerOf.has(n.id)?layerOf.get(n.id):8}));
  const nset = new Set(nodes.map(n=>n.id));
  const indeg = {}; g.edges.forEach(e=>{ if(nset.has(e.source)&&nset.has(e.target)) indeg[e.target]=(indeg[e.target]||0)+1; });
  nodes.forEach(n=> n.deg = indeg[n.id]||0 );
  const links = g.edges.filter(e=>nset.has(e.source)&&nset.has(e.target)).map(e=>({...e}));

  document.getElementById("stats").innerHTML =
    `<b>${nodes.length}</b> 파일 · <b>${links.length}</b> 관계 · <b>${g.layers.length}</b> 레이어 · 투어 <b>${g.tour.length}</b>단계 <span style="color:#6b6391">(전체 ${g.nodes.length} 노드/${g.edges.length} 엣지)</span>`;

  // legend
  const active = new Set(layerMeta.map(l=>l.idx));
  const legend = d3.select("#legend");
  layerMeta.forEach(l=>{
    const cnt = nodes.filter(n=>n.layer===l.idx).length;
    const row = legend.append("div").attr("class","row").on("click",()=>{ active.has(l.idx)?active.delete(l.idx):active.add(l.idx); row.classed("off",!active.has(l.idx)); update(); });
    row.append("span").attr("class","dot").style("background",l.color);
    row.append("span").text(l.name);
    row.append("span").attr("class","ct").text(cnt);
  });

  const svg = d3.select("svg");
  const W = svg.node().clientWidth, H = svg.node().clientHeight;
  const root = svg.append("g");
  svg.call(d3.zoom().scaleExtent([0.2,4]).on("zoom",ev=>root.attr("transform",ev.transform)));

  const link = root.append("g").selectAll("line").data(links).join("line").attr("class","link");
  const node = root.append("g").selectAll("circle").data(nodes).join("circle")
    .attr("class","node").attr("r",d=>4+Math.sqrt(d.deg)*2.4).attr("fill",d=>layerMeta[d.layer]?layerMeta[d.layer].color:"#94a3b8")
    .call(d3.drag().on("start",dstart).on("drag",dragged).on("end",dend)).on("click",(e,d)=>showDetail(d));
  const label = root.append("g").selectAll("text").data(nodes).join("text").attr("class","lab")
    .text(d=>(d.filePath||d.name||"").replace(/^src\//,"").replace(/\/page\.tsx$/,"/page").split("/").pop());

  let _ticks=0;
  const sim = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d=>d.id).distance(60).strength(.35))
    .force("charge", d3.forceManyBody().strength(-180))
    .force("center", d3.forceCenter(W/2, H/2))
    .force("collide", d3.forceCollide().radius(d=>10+Math.sqrt(d.deg)*2.4))
    .on("tick",()=>{ link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
      node.attr("cx",d=>d.x).attr("cy",d=>d.y); label.attr("x",d=>d.x+8).attr("y",d=>d.y+3);
      if(++_ticks>240) sim.stop(); /* settle then freeze so the page can render idle */ });

  function dstart(e,d){ if(!e.active) sim.alphaTarget(.3).restart(); d.fx=d.x; d.fy=d.y; }
  function dragged(e,d){ d.fx=e.x; d.fy=e.y; }
  function dend(e,d){ if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }

  let q="";
  function update(){
    node.classed("dim",d=>!active.has(d.layer) || (q && !match(d)));
    label.classed("dim",d=>!active.has(d.layer) || (q && !match(d)));
    link.style("display",d=>active.has(d.source.layer)&&active.has(d.target.layer)?null:"none");
  }
  function match(d){ const s=(d.filePath+" "+d.name+" "+(d.summary||"")+" "+((d.tags||[]).join(" "))).toLowerCase(); return s.includes(q); }
  d3.select("#search").on("input",function(){ q=this.value.trim().toLowerCase(); update();
    link.classed("hl",d=> q && (match(d.source)||match(d.target)) ); });

  function showDetail(d){
    const lm = layerMeta[d.layer];
    const out = g.edges.filter(e=>e.source===d.id).map(e=>({id:e.target,type:e.type,dir:"→"}));
    const inc = g.edges.filter(e=>e.target===d.id).map(e=>({id:e.source,type:e.type,dir:"←"}));
    const relRows = [...inc,...out].slice(0,40).map(r=>{
      const n=byId.get(r.id)||{name:r.id};
      return `<a data-id="${r.id}"><span class="ek">${r.dir} ${r.type}</span> ${ (n.filePath||n.name||r.id).replace(/^src\//,"") }</a>`;
    }).join("");
    document.getElementById("detail").innerHTML =
      `<p class="nm">${d.name||d.id}</p>
       <span class="ty">${d.type}</span>
       ${d.filePath?`<div class="fp">${d.filePath}</div>`:""}
       <div style="font-size:11px;color:${lm?lm.color:'#94a3b8'};margin-bottom:10px;">● ${lm?lm.name:"기타"}</div>
       <p class="sm">${d.summary||"요약 없음"}</p>
       <div class="tags">${(d.tags||[]).map(t=>`<span class="tag">${t}</span>`).join("")}</div>
       <div class="rel"><h3>관계 (${inc.length}← / ${out.length}→)</h3>${relRows||"<span class='hint'>관계 없음</span>"}</div>`;
    document.querySelectorAll("#detail .rel a").forEach(a=>a.onclick=()=>{ const t=nodes.find(n=>n.id===a.dataset.id); if(t) showDetail(t); });
  }
  update();
});
</script>
</body>
</html>
